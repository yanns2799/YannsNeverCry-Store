<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skena Store</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: white;
    }header {
  text-align: center;
  padding: 30px;
  font-size: 28px;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #111, #1a1a1a);
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1a1a1a;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(255,255,255,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.title {
  font-size: 18px;
  margin-bottom: 10px;
}

.price {
  color: #aaa;
  margin-bottom: 10px;
}

.btn {
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #fff;
  color: #000;
  cursor: pointer;
  transition: 0.2s;
}

.btn:active {
  transform: scale(0.9);
  background: #ccc;
}

footer {
  text-align: center;
  padding: 20px;
  color: #777;
}


.floating-logo {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  font-weight: bold;
  letter-spacing: 2px;
  color: #fff;
  opacity: 0.8;
  animation: float 3s ease-in-out infinite;
  pointer-events: none;
}

@keyframes float {
  0% { transform: translate(-50%, 0px); }
  50% { transform: translate(-50%, 10px); }
  100% { transform: translate(-50%, 0px); }
}

</style>
</head>
<body><div class="floating-logo">yannsnevercry.id</div><header>
  SKENA STORE ⚡
</header><div class="container">  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975922284-8b456906c813" />
    <div class="card-content">
      <div class="title">Oversized Tee Hitam</div>
      <div class="price">Rp 120.000</div>
      <button class="btn">Beli</button>
    </div>
  </div>  <div class="card">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552" />
    <div class="card-content">
      <div class="title">Sneakers Putih Clean</div>
      <div class="price">Rp 350.000</div>
      <button class="btn">Beli</button>
    </div>
  </div>  <div class="card">
    <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6" />
    <div class="card-content">
      <div class="title">Belt Street Style</div>
      <div class="price">Rp 90.000</div>
      <button class="btn">Beli</button>
    </div>
  </div></div><footer>
  © 2026 Skena Store
</footer><script>
  const buttons = document.querySelectorAll('.btn');

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      btn.innerText = '✔ Dibeli';
      btn.style.background = '#4caf50';
      btn.style.color = '#fff';
    });
  });
</script></body>
  </html>
